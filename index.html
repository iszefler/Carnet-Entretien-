<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet — Entretien véhicules</title>
<meta name="theme-color" content="#17191F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --ink:#17191F;
    --ink-soft:#3A3D45;
    --steel:#6B6F78;
    --line:#D9DAD4;
    --line-soft:#E7E8E2;
    --bg:#EBECE7;
    --panel:#FFFFFF;
    --panel-2:#F4F5F1;
    --ok:#1F8A4C;
    --ok-bg:#E6F2EA;
    --soon:#C77A00;
    --soon-bg:#FBEFD9;
    --late:#CC392B;
    --late-bg:#FBE6E3;
    --focus:#1d4ed8;
    --radius:4px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
  .cond{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}

  /* ---- Top bar ---- */
  header.topbar{
    position:sticky;top:0;z-index:30;
    background:var(--ink);
    color:#F3F3EF;
    border-bottom:3px solid #000;
  }
  .topbar-inner{
    max-width:880px;margin:0 auto;padding:10px 16px;
    display:flex;align-items:center;gap:14px;
  }
  .brand{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    font-size:21px;line-height:1;display:flex;align-items:center;gap:9px;
  }
  .brand .tell{width:11px;height:11px;border-radius:50%;
    background:var(--soon);box-shadow:0 0 9px var(--soon);}
  .brand small{
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-weight:400;
    font-size:10px;letter-spacing:.05em;color:#8A8E97;text-transform:none;
  }
  .topbar-spacer{flex:1}

  /* vehicle tabs */
  .veh-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
  .veh-tabs::-webkit-scrollbar{display:none}
  .veh-tab{
    flex:0 0 auto;border:1px solid #34373F;background:#22252C;color:#C9CBD1;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;font-size:14px;padding:7px 12px;border-radius:var(--radius);
    cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .veh-tab .ic{font-size:13px;opacity:.8}
  .veh-tab[aria-selected="true"]{
    background:#F3F3EF;color:var(--ink);border-color:#F3F3EF;
  }
  .veh-tab:focus-visible{outline:2px solid #7da2ff;outline-offset:1px}

  .btn{
    cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:#fff;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;font-size:14px;padding:7px 13px;border-radius:var(--radius);
    line-height:1;display:inline-flex;align-items:center;gap:6px;
  }
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.ghost.on-dark{color:#F3F3EF;border-color:#3C3F47;background:#22252C}
  .btn.tiny{font-size:12px;padding:5px 9px}
  .btn:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  .btn[disabled]{opacity:.4;cursor:not-allowed}

  main{max-width:880px;margin:0 auto;padding:18px 16px 90px;}

  /* ---- Vehicle panel ---- */
  .veh-panel{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    overflow:hidden;margin-bottom:18px;
  }
  .veh-head{
    padding:14px 16px 12px;border-bottom:1px solid var(--line-soft);
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  }
  .veh-name{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;
    font-size:25px;line-height:1;letter-spacing:.01em;text-transform:uppercase;
  }
  .veh-meta{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11.5px;color:var(--steel);
    margin-top:5px;letter-spacing:.02em}
  .veh-actions{display:flex;gap:6px;flex-shrink:0}
  .icon-btn{
    cursor:pointer;border:1px solid var(--line);background:var(--panel);
    width:30px;height:30px;border-radius:var(--radius);color:var(--steel);
    display:grid;place-items:center;font-size:14px;
  }
  .icon-btn:hover{color:var(--ink);border-color:var(--steel)}
  .icon-btn:focus-visible{outline:2px solid var(--focus);outline-offset:1px}

  .gauges{display:grid;grid-template-columns:1.4fr 1fr 1fr;}
  .gauge{padding:14px 16px;border-right:1px solid var(--line-soft);}
  .gauge:last-child{border-right:none}
  .gauge-label{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-transform:uppercase;
    letter-spacing:.1em;font-size:11px;color:var(--steel);font-weight:600;margin-bottom:4px}
  .odo{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .odo-val{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-weight:700;font-size:27px;
    letter-spacing:-.5px;line-height:1}
  .odo-unit{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:13px;color:var(--steel)}
  .gauge-sub{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11px;color:var(--steel);margin-top:5px}
  .gauge .big{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-weight:700;font-size:24px;line-height:1}

  /* ---- Section ---- */
  .section{margin-bottom:22px}
  .section-head{display:flex;align-items:center;justify-content:space-between;
    margin:0 2px 10px;gap:10px}
  .section-title{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:17px;display:flex;align-items:center;gap:9px}
  .count-chip{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11px;color:var(--steel);
    border:1px solid var(--line);border-radius:20px;padding:1px 8px}

  /* ---- Tell-tale rows (reminders) ---- */
  .tell-list{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .tell-row{
    display:grid;grid-template-columns:auto 1fr auto;gap:13px;align-items:center;
    padding:12px 15px;border-bottom:1px solid var(--line-soft);cursor:pointer;
  }
  .tell-row:last-child{border-bottom:none}
  .tell-row:hover{background:var(--panel-2)}
  .tell-row:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
  .dot{width:13px;height:13px;border-radius:50%;border:2px solid;flex-shrink:0}
  .dot.ok{background:var(--ok);border-color:var(--ok)}
  .dot.soon{background:var(--soon);border-color:var(--soon)}
  .dot.late{background:var(--late);border-color:var(--late);
    box-shadow:0 0 0 0 rgba(204,57,43,.5);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(204,57,43,.45)}70%{box-shadow:0 0 0 7px rgba(204,57,43,0)}100%{box-shadow:0 0 0 0 rgba(204,57,43,0)}}
  @media (prefers-reduced-motion:reduce){.dot.late{animation:none}}
  .tell-main{min-width:0}
  .tell-type{font-weight:600;font-size:15px}
  .tell-int{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11px;color:var(--steel);margin-top:1px}
  .tell-status{text-align:right;flex-shrink:0}
  .tell-badge{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.05em;font-size:12.5px;padding:2px 8px;border-radius:3px;display:inline-block}
  .tell-badge.ok{color:var(--ok);background:var(--ok-bg)}
  .tell-badge.soon{color:var(--soon);background:var(--soon-bg)}
  .tell-badge.late{color:var(--late);background:var(--late-bg)}
  .tell-eta{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11px;color:var(--ink-soft);margin-top:3px}

  /* ---- History ---- */
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
  select.filter,input.filter{
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:12px;border:1px solid var(--line);
    background:var(--panel);border-radius:var(--radius);padding:6px 9px;color:var(--ink);
  }
  select.filter:focus-visible,input.filter:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
  .hist{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .hist-row{
    display:grid;grid-template-columns:78px 1fr auto;gap:13px;align-items:center;
    padding:11px 15px;border-bottom:1px solid var(--line-soft);cursor:pointer;
  }
  .hist-row:last-child{border-bottom:none}
  .hist-row:hover{background:var(--panel-2)}
  .hist-date{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11.5px;color:var(--steel);line-height:1.3}
  .hist-mid{min-width:0}
  .hist-type{font-weight:600;font-size:15px}
  .hist-detail{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:11px;color:var(--steel);
    margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hist-cost{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-weight:700;font-size:14px;text-align:right;white-space:nowrap}

  .empty{padding:26px 16px;text-align:center;color:var(--steel);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6}
  .empty b{color:var(--ink-soft);font-weight:500}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(20,22,27,.55);z-index:50;
    display:none;align-items:flex-end;justify-content:center;padding:0}
  .overlay.show{display:flex}
  @media(min-width:560px){.overlay{align-items:center;padding:20px}}
  .modal{
    background:var(--panel);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
    border-radius:10px 10px 0 0;border:1px solid var(--line);
  }
  @media(min-width:560px){.modal{border-radius:8px}}
  .modal-head{
    position:sticky;top:0;background:var(--panel);padding:16px 18px 12px;
    border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;
  }
  .modal-title{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.05em;font-size:19px}
  .modal-body{padding:16px 18px 20px}
  .field{margin-bottom:13px}
  .field label{display:block;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.07em;font-size:11.5px;color:var(--steel);margin-bottom:4px}
  .field input,.field select,.field textarea{
    width:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;border:1px solid var(--line);
    border-radius:var(--radius);padding:9px 11px;background:var(--panel);color:var(--ink);
  }
  .field input.mono,.field.mono input{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace}
  .field textarea{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;min-height:62px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--focus);outline-offset:1px;border-color:var(--focus)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .pchk{display:flex;align-items:center;gap:9px;font-size:14.5px;padding:5px 0;cursor:pointer}
  .pchk input{width:auto;margin:0;width:17px;height:17px;accent-color:var(--ink)}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .thumb{position:relative;width:64px;height:64px;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:var(--panel-2)}
  .thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
  .thumb-x{position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:50%;
    background:rgba(20,22,27,.78);color:#fff;font-size:10px;line-height:1;cursor:pointer;display:grid;place-items:center}
  .todo-add{display:flex;gap:7px;margin-bottom:9px}
  .todo-list{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .todo-row{display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line-soft)}
  .todo-row:last-child{border-bottom:none}
  .todo-check{width:22px;height:22px;border:1.5px solid var(--steel);border-radius:5px;background:var(--panel);
    cursor:pointer;color:#fff;font-size:13px;display:grid;place-items:center;flex-shrink:0}
  .todo-row.done .todo-check{background:var(--ok);border-color:var(--ok)}
  .todo-text{font-size:14.5px;min-width:0;overflow-wrap:anywhere}
  .todo-row.done .todo-text{text-decoration:line-through;color:var(--steel)}
  .todo-del{border:none;background:none;color:var(--steel);cursor:pointer;font-size:13px;padding:4px}
  .todo-del:hover{color:var(--late)}
  .hint{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:10.5px;color:var(--steel);margin-top:4px;line-height:1.4}
  .seg{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;width:fit-content}
  .seg button{border:none;background:var(--panel);padding:8px 16px;cursor:pointer;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:13px;color:var(--steel)}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .modal-foot{display:flex;gap:9px;justify-content:space-between;align-items:center;
    padding:14px 18px;border-top:1px solid var(--line-soft);position:sticky;bottom:0;background:var(--panel)}
  .modal-foot .right{display:flex;gap:9px}
  .link-danger{background:none;border:none;color:var(--late);cursor:pointer;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:13px}
  .note{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:9px 11px;font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:10.5px;color:var(--steel);line-height:1.5;margin-top:6px}

  /* FAB */
  .fab{
    position:fixed;right:18px;bottom:18px;z-index:40;
    background:var(--ink);color:#fff;border:none;border-radius:50px;
    padding:14px 20px;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.06em;font-size:15px;cursor:pointer;
    box-shadow:0 6px 20px rgba(20,22,27,.28);display:inline-flex;align-items:center;gap:8px;
  }
  .fab:focus-visible{outline:2px solid #7da2ff;outline-offset:2px}

  @media(max-width:520px){
    .gauges{grid-template-columns:1fr 1fr}
    .gauge:nth-child(1){grid-column:1/-1;border-right:none;border-bottom:1px solid var(--line-soft)}
    .veh-name{font-size:22px}
  }

  /* ---- Impression ---- */
  #printArea{display:none}
  @media print{
    @page{ margin:14mm; }
    header.topbar, main, .fab, .overlay, #toast{ display:none !important; }
    body{ background:#fff; color:#000; }
    #printArea{ display:block !important; color:#000;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; font-variant-numeric:tabular-nums; }
    #printArea h1{ font-size:19px; margin:0 0 3px; letter-spacing:.01em; }
    #printArea .pmeta{ font-size:11px; color:#222; margin-bottom:6px; }
    #printArea h2{ font-size:12px; text-transform:uppercase; letter-spacing:.06em;
      border-bottom:1.5px solid #000; padding-bottom:3px; margin:18px 0 7px; }
    #printArea table{ width:100%; border-collapse:collapse; font-size:11px; }
    #printArea thead{ display:table-header-group; }
    #printArea th{ text-align:left; border-bottom:1.2px solid #000; padding:4px 7px;
      font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; }
    #printArea td{ padding:4px 7px; border-bottom:1px solid #d3d3d3; vertical-align:top; }
    #printArea tr{ break-inside:avoid; }
    #printArea td.num, #printArea th.num{ text-align:right; white-space:nowrap; }
    #printArea .late{ font-weight:700; }
    #printArea .pfoot{ margin-top:16px; padding-top:6px; border-top:1px solid #000;
      font-size:10px; color:#333; display:flex; justify-content:space-between; }
    #printArea .ptot{ font-weight:700; color:#000; }
    #printArea .psign{ display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin-top:6px; }
    #printArea .psign .box{ border:1px solid #000; border-radius:3px; min-height:64px;
      padding:5px 7px; font-size:9.5px; color:#444; break-inside:avoid; }
    #printArea .pveh + .pveh{ break-before:page; padding-top:4px; }
    #printArea .pqr{ text-align:center; padding-top:30px; }
    #printArea .pqr h1{ margin-bottom:18px; }
    #printArea .pqr .qwrap svg{ width:62mm; height:62mm; }
    #printArea .pqr .qurl{ margin-top:14px; font-size:12px; word-break:break-all; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="tell"></span>
      <span>Carnet</span>
      <small id="saveStat" style="margin-left:8px;font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;font-weight:400;font-size:10px;letter-spacing:.02em;text-transform:none;"></small>
    </div>
    <div class="topbar-spacer"></div>
    <button class="btn ghost on-dark tiny" id="printBtn" aria-label="Imprimer le carnet" title="Imprimer" style="padding:5px 10px;font-size:15px">⎙</button>
    <button class="btn ghost on-dark tiny" id="dataBtn" aria-label="Sauvegarde des données" title="Sauvegarde / restauration" style="padding:5px 10px;font-size:15px">⛁</button>
    <button class="btn ghost on-dark tiny" id="addVehBtn">+ Véhicule</button>
  </div>
  <div class="topbar-inner" style="padding-top:0;padding-bottom:10px">
    <div class="veh-tabs" id="vehTabs"></div>
  </div>
</header>

<main id="app"></main>

<button class="fab" id="fabAdd">+ Entretien</button>

<div id="printArea"></div>

<div class="overlay" id="overlay"></div>

<script>

<script>
"use strict";

/* ----------------------------------------------------------
   Stockage navigateur (localStorage) — version autonome hébergeable
----------------------------------------------------------- */
const KEY = "carnet-data-v2";

let state = { vehicles: [], records: [], schedules: [], activeId: null };

/* Stockage navigateur (localStorage) — fonctionne sur une page hébergée, hors-ligne inclus */
function loadRaw(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } }
function saveRaw(json){ try{ localStorage.setItem(KEY, json); return true; }catch(e){ return false; } }

function ensurePrefs(){
  const d={order:"desc",cols:{km:true,cout:true,notes:true},surveiller:true,total:true,sign:0};
  const p=state.printPrefs||{};
  state.printPrefs={
    order:p.order==="asc"?"asc":"desc",
    cols:Object.assign({},d.cols,p.cols||{}),
    surveiller:p.surveiller!==false,
    total:p.total!==false,
    sign:Number(p.sign)||0,
    scope:p.scope==="all"?"all":"active"
  };
}
function loadState(){
  const raw = loadRaw();
  if(raw){ try{ state = JSON.parse(raw); }catch(e){ seed(); } }
  else seed();
  ensurePrefs();
  if(!Array.isArray(state.todos)) state.todos=[];
  if(!state.activeId && state.vehicles[0]) state.activeId = state.vehicles[0].id;
}

/* ---- Photos : IndexedDB (gros volume) + compression ---- */
const PDB="carnet-photos", PSTORE="img";
function idbOpen(){return new Promise((res,rej)=>{const rq=indexedDB.open(PDB,1);
  rq.onupgradeneeded=()=>{rq.result.createObjectStore(PSTORE);};
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);});}
async function idbPut(id,val){const db=await idbOpen();return new Promise((res,rej)=>{
  const tx=db.transaction(PSTORE,"readwrite");tx.objectStore(PSTORE).put(val,id);
  tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function idbGet(id){const db=await idbOpen();return new Promise((res,rej)=>{
  const tx=db.transaction(PSTORE,"readonly");const r=tx.objectStore(PSTORE).get(id);
  r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}
async function idbDel(id){const db=await idbOpen();return new Promise((res,rej)=>{
  const tx=db.transaction(PSTORE,"readwrite");tx.objectStore(PSTORE).delete(id);
  tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
function resizeImage(file,maxDim=1280,quality=0.7){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      try{ res(c.toDataURL("image/jpeg",quality)); }catch(e){ rej(e); }
    };
    img.onerror=()=>rej(new Error("image illisible"));
    const fr=new FileReader(); fr.onload=()=>img.src=fr.result; fr.onerror=()=>rej(new Error("lecture")); fr.readAsDataURL(file);
  });
}
function saveState(){
  const ok = saveRaw(JSON.stringify(state));
  setSaveStat(ok ? "ok" : "err");
}
function setSaveStat(s){
  const el=document.getElementById("saveStat"); if(!el) return;
  if(s==="ok"){ el.textContent="✓ enregistré"; el.style.color="#7BD49B"; }
  else { el.textContent="⚠ non enregistré · ⛁"; el.style.color="#E0916B"; }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);

/* ----------------------------------------------------------
   Données de départ (modifiables) — pré-remplies pour démarrer
----------------------------------------------------------- */
function seed(){
  // Version vierge : aucune donnée personnelle. Le carnet se charge via le bouton ⛁.
  state = { activeId:null, vehicles:[], records:[], schedules:[] };
  saveState();
}
function sch(vehiculeId,type,km,mois,match){
  return { id:uid(), vehiculeId, type, intKm:km, intMois:mois, baseKm:null, baseDate:null, match:match||null };
}
function norm(s){return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function recMatchesSchedule(r,s){
  const rt=norm(r.type);
  const keys=(s.match&&s.match.length)?s.match:[norm(s.type)];
  return keys.some(k=>k&&rt.includes(k));
}

/* ----------------------------------------------------------
   Helpers d'affichage
----------------------------------------------------------- */
const fmtKm = n => (n==null||n==="") ? "—" : Number(n).toLocaleString("fr-FR")+" km";
const fmtKmRaw = n => Number(n).toLocaleString("fr-FR");
const fmtEUR = n => (n==null||n==="") ? "—" : Number(n).toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
const fmtEUR2 = n => Number(n).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtDateShort(iso){ if(!iso) return ""; const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}); }
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const activeVeh = () => state.vehicles.find(v=>v.id===state.activeId);
const vehRecords = vid => state.records.filter(r=>r.vehiculeId===vid).sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.km||0)-(a.km||0));
const vehSchedules = vid => state.schedules.filter(s=>s.vehiculeId===vid);

const TYPES = ["Vidange + filtre à huile","Filtre à huile","Filtre à air","Filtre habitacle","Filtre à carburant",
"Courroie d'accessoire","Courroie de distribution","Plaquettes avant","Plaquettes arrière","Disques de frein",
"Liquide de frein","Liquide de refroidissement","Pneus avant","Pneus arrière","Bougies","Batterie",
"Amortisseurs","Embrayage","Contrôle technique","Révision générale","Réparation","Autre"];

/* ----------------------------------------------------------
   Calcul des échéances
----------------------------------------------------------- */
function computeStatus(s){
  const veh = state.vehicles.find(v=>v.id===s.vehiculeId);
  const curKm = veh ? Number(veh.km)||0 : 0;
  // dernière intervention de ce type, sinon base, sinon état actuel du véhicule
  const recs = state.records.filter(r=>r.vehiculeId===s.vehiculeId && recMatchesSchedule(r,s))
                            .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const last = recs[0];
  const lastKm = last && last.km!=null && last.km!=="" ? Number(last.km) : (s.baseKm!=null ? Number(s.baseKm) : curKm);
  const lastDate = last && last.date ? last.date : (s.baseDate || veh?.kmDate || today());

  let kmRemain = null, nextKm = null;
  if(s.intKm){ nextKm = lastKm + Number(s.intKm); kmRemain = nextKm - curKm; }

  let daysRemain = null, nextDate = null;
  if(s.intMois){
    const d = new Date(lastDate+"T00:00:00"); d.setMonth(d.getMonth()+Number(s.intMois));
    nextDate = d.toISOString().slice(0,10);
    daysRemain = Math.round((d - new Date(today()+"T00:00:00"))/86400000);
  }

  // statut = pire des deux
  let level = "ok";
  const overKm = kmRemain!=null && kmRemain<0;
  const overDay = daysRemain!=null && daysRemain<0;
  const soonKm = kmRemain!=null && kmRemain<=1000;
  const soonDay = daysRemain!=null && daysRemain<=30;
  if(overKm||overDay) level="late";
  else if(soonKm||soonDay) level="soon";

  // métrique à afficher = la plus contraignante
  let eta = "";
  const kmTxt = kmRemain!=null ? (kmRemain<0 ? "dépassé de "+fmtKmRaw(-kmRemain)+" km" : "dans "+fmtKmRaw(kmRemain)+" km") : null;
  const dayTxt = daysRemain!=null ? (daysRemain<0 ? "dépassé de "+(-daysRemain)+" j" : (daysRemain>=60 ? "dans "+Math.round(daysRemain/30)+" mois" : "dans "+daysRemain+" j")) : null;
  if(kmRemain!=null && daysRemain!=null){ eta = (kmRemain<=daysRemain*40 ? kmTxt : dayTxt); }
  else eta = kmTxt || dayTxt || "—";

  return { level, eta, nextKm, nextDate, kmRemain, daysRemain };
}
const rank = {late:0,soon:1,ok:2};

/* ----------------------------------------------------------

----------------------------------------------------------- */
let histFilter = { type:"", q:"" };

  renderTabs();

  if(!veh){
    app.innerHTML = `<div class="empty" style="margin-top:40px">
      <b>Aucun véhicule.</b><br>Ajoutez votre première voiture ou moto avec « + Véhicule »,<br>ou restaurez une sauvegarde via le bouton ⛁ en haut.</div>`;

  const nbLate = alertLevels.filter(l=>l==='late').length;
  const todos = state.todos.filter(t=>t.vehiculeId===veh.id);

  const metaBits = [veh.annee, veh.motorisation, veh.immat].filter(Boolean).join("  ·  ");

  app.innerHTML = `
    <div class="veh-panel">
      <div class="veh-head">
        <div>
          <div class="veh-name">${esc(veh.marque)} ${esc(veh.modele)}</div>
          <div class="veh-meta">${esc(metaBits)||"—"}</div>
        </div>
        <div class="veh-actions">
          <button class="icon-btn" id="editVeh" title="Modifier le véhicule" aria-label="Modifier le véhicule">✎</button>
        </div>
      </div>
      <div class="gauges">
        <div class="gauge">
          <div class="gauge-label">Kilométrage</div>
          <div class="odo">
            <span class="odo-val">${veh.km!=null?fmtKmRaw(veh.km):"—"}</span>
            <span class="odo-unit">km</span>
          </div>
          <div class="gauge-sub">relevé le ${fmtDate(veh.kmDate)} · <a href="#" id="updKm" style="color:var(--focus)">mettre à jour</a></div>
        </div>
        <div class="gauge">
          <div class="gauge-label">Coût total</div>
          <div class="big">${fmtEUR(totalCost)}</div>
          <div class="gauge-sub">sur ${recs.length} interv.</div>
        </div>
        <div class="gauge">
          <div class="gauge-label">À surveiller</div>
          <div class="big" style="color:${nbLate?'var(--late)':alertLevels.includes('soon')?'var(--soon)':'var(--ok)'}">
            ${nbWatch}
          </div>
          <div class="gauge-sub">${nbLate} en retard</div>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <div class="section-title">À surveiller <span class="count-chip">${schedules.length}</span></div>
        <button class="btn ghost tiny" id="addSch">+ Type suivi</button>
      </div>
      <div class="tell-list" id="tellList">
        ${ct?ctRow(ct):""}
        ${schedules.length ? schedules.map(({s,st})=>tellRow(s,st)).join("") :
          (ct?"":`<div class="empty"><b>Aucun entretien suivi.</b><br>Ajoutez un type (vidange, freins…) avec sa périodicité pour activer les rappels.</div>`)}
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">À faire / à acheter <span class="count-chip">${todos.filter(t=>!t.done).length}</span></div>
      </div>
      <div class="todo-add">
        <input class="filter" id="todoInput" placeholder="ex. acheter pompe à eau, prendre RDV CT…" style="flex:1">
        <button class="btn tiny" id="todoAdd">Ajouter</button>
      </div>
      <div class="todo-list" id="todoList">
        ${todos.length? todos.map(todoRow).join("") : `<div class="empty" style="padding:14px"><b>Rien pour l'instant.</b></div>`}
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">Historique <span class="count-chip">${recs.length}</span></div>
      </div>

          [...new Set(recs.map(r=>r.type))].map(t=>`<option value="${esc(t)}" ${histFilter.type===t?"selected":""}>${esc(t)}</option>`).join("")
        }</select>
        <input class="filter" id="fQ" placeholder="rechercher (garage, note…)" value="${esc(histFilter.q)}" style="flex:1;min-width:130px">
      </div>`:""}
      <div class="hist" id="histList">
        ${renderHistRows(recs)}
      </div>
    </section>
  `;

  // listeners
  document.getElementById("editVeh").onclick = ()=>vehicleModal(veh);
  document.getElementById("updKm").onclick = e=>{e.preventDefault();kmModal(veh);};
  document.getElementById("addSch").onclick = ()=>scheduleModal(null,veh.id);
  const fType=document.getElementById("fType"), fQ=document.getElementById("fQ");
  if(fType) fType.onchange=()=>{histFilter.type=fType.value;refreshHist();};
  if(fQ) fQ.oninput=()=>{histFilter.q=fQ.value;refreshHist();};
  const ctEl=document.querySelector("[data-ct]"); if(ctEl) ctEl.onclick=()=>vehicleModal(veh);
  const tAdd=document.getElementById("todoAdd"), tIn=document.getElementById("todoInput");
  if(tAdd&&tIn){
    const add=()=>{ const txt=tIn.value.trim(); if(!txt) return;
      state.todos.push({id:uid(),vehiculeId:veh.id,text:txt,done:false}); saveState(); render(); };
    tAdd.onclick=add; tIn.onkeydown=e=>{ if(e.key==="Enter") add(); };
  }
  document.querySelectorAll("[data-todo]").forEach(el=>{
    const t=state.todos.find(x=>x.id===el.dataset.todo); if(!t) return;
    const chk=el.querySelector("[data-toggle]"); if(chk) chk.onclick=()=>{ t.done=!t.done; saveState(); render(); };
    const del=el.querySelector("[data-tdel]"); if(del) del.onclick=()=>{ state.todos=state.todos.filter(x=>x.id!==t.id); saveState(); render(); };
  });
  bindRowClicks();
}

function ctStatus(veh){
  if(!veh.ctDate) return null;
  const d=new Date(veh.ctDate+"T00:00:00");
  const days=Math.round((d-new Date(today()+"T00:00:00"))/86400000);
  const level= days<0?"late": days<=60?"soon":"ok";
  const eta= days<0?("dépassé de "+(-days)+" j") : (days>=60?("dans "+Math.round(days/30)+" mois"):("dans "+days+" j"));
  return {level,eta,date:veh.ctDate};
}

  return `<div class="tell-row" tabindex="0" role="button" data-ct="1">
    <span class="dot ${ct.level}"></span>

}
function todoRow(t){

function applyFilter(recs){
  return recs.filter(r=>{
    if(histFilter.type && r.type!==histFilter.type) return false;
    if(histFilter.q){
      const q=histFilter.q.toLowerCase();
      const hay=[r.type,r.lieu,r.notes,r.refs].filter(Boolean).join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function renderHistRows(recs){
  const list = applyFilter(recs);
  if(!list.length) return `<div class="empty"><b>${recs.length?"Aucun résultat":"Aucune intervention enregistrée"}.</b><br>${recs.length?"Modifiez les filtres.":"Touchez « + Entretien » pour en ajouter une."}</div>`;
  return list.map(r=>{
    const np=(r.photos||[]).length;
    const detail=[r.km!=null&&r.km!==""?fmtKmRaw(r.km)+" km":null, r.lieu, r.refs?("réf. "+r.refs):null,
      np?("📷 "+np):null].filter(Boolean).join(" · ");
    return `<div class="hist-row" tabindex="0" role="button" data-rec="${r.id}">
      <div class="hist-date">${fmtDateShort(r.date)}</div>
      <div class="hist-mid">
        <div class="hist-type">${esc(r.type)}</div>
        <div class="hist-detail">${esc(detail)||"&nbsp;"}</div>
      </div>
      <div class="hist-cost">${r.cout!=null&&r.cout!==""?fmtEUR(r.cout):"—"}</div>
    </div>`;
  }).join("");
}
function refreshHist(){
  const veh=activeVeh(); if(!veh) return;

}
function bindRowClicks(){
  document.querySelectorAll("[data-rec]").forEach(el=>{

    el.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();scheduleModal(s,s.vehiculeId);}};

}

/* ----------------------------------------------------------
   Modales
----------------------------------------------------------- */
const overlay=document.getElementById("overlay");
function openModal(html){
  overlay.innerHTML=`<div class="modal" role="dialog" aria-modal="true">${html}</div>`;
  overlay.classList.add("show");
  document.body.style.overflow="hidden";
  const first=overlay.querySelector("input,select,textarea,button");
  if(first) setTimeout(()=>first.focus(),40);
}
function closeModal(){overlay.classList.remove("show");overlay.innerHTML="";document.body.style.overflow="";}
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&overlay.classList.contains("show"))closeModal();});

function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function numOrNull(id){const v=val(id);return v===""?null:Number(v.replace(/\s/g,"").replace(",","."));}

/* Dialogues internes (les confirm()/alert() natifs sont bloqués dans l'iframe) */
function confirmDialog(msg){
  return new Promise(resolve=>{
    const d=document.createElement("div");
    d.className="overlay show"; d.style.zIndex="60";
    d.innerHTML=`<div class="modal" role="dialog" aria-modal="true" style="max-width:380px">
      <div class="modal-body" style="padding:22px 18px 6px"><div style="font-size:15px;line-height:1.5">${esc(msg)}</div></div>
      <div class="modal-foot"><span></span><div class="right">
        <button class="btn ghost" data-no>Annuler</button>
        <button class="btn" data-yes style="background:var(--late);border-color:var(--late)">Supprimer</button>
      </div></div></div>`;
    document.body.appendChild(d);
    const done=v=>{d.remove();resolve(v);};
    d.querySelector("[data-no]").onclick=()=>done(false);
    d.querySelector("[data-yes]").onclick=()=>done(true);
    d.addEventListener("click",e=>{if(e.target===d)done(false);});
    setTimeout(()=>d.querySelector("[data-yes]").focus(),40);
  });
}
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);
    t.style.cssText="position:fixed;left:50%;top:14px;transform:translateX(-50%);z-index:90;background:var(--ink);color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:13.5px;line-height:1.4;padding:10px 16px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.32);max-width:88%;text-align:center;transition:opacity .3s;opacity:0";}
  t.textContent=msg;requestAnimationFrame(()=>{t.style.opacity="1";});
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity="0";},2600);
}

/* --- Intervention (record) --- */
function recordModal(rec,vehId){
  const isNew=!rec;
  const veh=state.vehicles.find(v=>v.id===vehId);
  rec=rec||{id:uid(),vehiculeId:vehId,type:"",date:today(),km:veh?.km??"",cout:"",lieu:"",notes:"",refs:"",photos:[]};
  let photos=Array.isArray(rec.photos)?rec.photos.slice():[];          // ids conservés
  const toDelete=[];                                                    // ids à purger à l'enregistrement
  openModal(`
    <div class="modal-head"><div class="modal-title">${isNew?"Nouvel entretien":"Modifier l'entretien"}</div>
      <button class="icon-btn" id="x" aria-label="Fermer">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Type d'intervention</label>
        <input id="rType" list="typeList" value="${esc(rec.type)}" placeholder="Vidange, plaquettes, pneus…">
        <datalist id="typeList">${TYPES.map(t=>`<option value="${esc(t)}">`).join("")}</datalist>
      </div>
      <div class="row2">
        <div class="field"><label>Date</label><input id="rDate" type="date" value="${esc(rec.date||today())}"></div>
        <div class="field mono"><label>Kilométrage</label><input id="rKm" class="mono" inputmode="numeric" value="${esc(rec.km)}" placeholder="km"></div>
      </div>
      <div class="row2">
        <div class="field mono"><label>Coût (€)</label><input id="rCout" class="mono" inputmode="decimal" value="${esc(rec.cout)}" placeholder="85"></div>
        <div class="field"><label>Garage / lieu</label><input id="rLieu" value="${esc(rec.lieu)}" placeholder="Dafy, maison…"></div>
      </div>
      <div class="field"><label>Pièces / références</label>
        <input id="rRefs" value="${esc(rec.refs||"")}" placeholder="Réf. pompe à eau, marque d'huile…"></div>
      <div class="field"><label>Notes</label>
        <textarea id="rNotes" placeholder="Observations…">${esc(rec.notes)}</textarea></div>
      <div class="field"><label>Photos (factures, pièces)</label>
        <input type="file" id="rPhoto" accept="image/*" class="filter" style="width:100%">
        <div class="hint" id="photoHint">Réduites automatiquement avant stockage. Restent sur cet appareil.</div>
        <div id="photoGrid" class="photo-grid"></div>
      </div>
    </div>
    <div class="modal-foot">
      ${isNew?"<span></span>":`<button class="link-danger" id="del">Supprimer</button>`}
      <div class="right">
        <button class="btn ghost" id="cancel">Annuler</button>
        <button class="btn" id="save">Enregistrer</button>
      </div>
    </div>
  `);
  const grid=document.getElementById("photoGrid");
  function renderThumbs(){
    grid.innerHTML = photos.map(id=>`<div class="thumb" data-ph="${id}"><img alt="photo" data-img="${id}"><button class="thumb-x" data-del="${id}" aria-label="Supprimer la photo">✕</button></div>`).join("");
    photos.forEach(id=>{ idbGet(id).then(d=>{ const im=grid.querySelector(`img[data-img="${id}"]`); if(im&&d) im.src=d; }).catch(()=>{}); });
    grid.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const id=b.dataset.del; photos=photos.filter(x=>x!==id); toDelete.push(id); renderThumbs();
    });
    grid.querySelectorAll("img[data-img]").forEach(im=>im.onclick=()=>{ if(im.src) window.open(im.src,"_blank"); });
  }
  renderThumbs();
  document.getElementById("rPhoto").onchange=async e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const hint=document.getElementById("photoHint"); hint.textContent="Compression en cours…";
    try{
      const dataUrl=await resizeImage(f);
      const id="ph-"+uid();
      await idbPut(id,dataUrl);
      photos.push(id); renderThumbs();
      hint.textContent="Photo ajoutée.";
    }catch(err){ hint.textContent="Échec de l'ajout de la photo."; toast("Photo non ajoutée."); }
    e.target.value="";
  };
  document.getElementById("x").onclick=closeModal;
  document.getElementById("cancel").onclick=closeModal;
  if(!isNew) document.getElementById("del").onclick=()=>{
    confirmDialog("Supprimer cette intervention ?").then(ok=>{ if(!ok) return;
      (rec.photos||[]).forEach(id=>idbDel(id).catch(()=>{}));
      state.records=state.records.filter(r=>r.id!==rec.id);saveState();closeModal();render();});
  };
  document.getElementById("save").onclick=()=>{
    const type=val("rType");
    if(!type){toast("Indiquez le type d'intervention.");return;}
    toDelete.forEach(id=>idbDel(id).catch(()=>{}));
    const obj={id:rec.id,vehiculeId:vehId,type,date:val("rDate")||today(),
      km:numOrNull("rKm"),cout:numOrNull("rCout"),lieu:val("rLieu"),refs:val("rRefs"),notes:val("rNotes"),photos};
    const i=state.records.findIndex(r=>r.id===rec.id);
    if(i>=0) state.records[i]=obj; else state.records.push(obj);

    if(v && obj.km!=null && (v.km==null || obj.km>Number(v.km)) && obj.date>= (v.kmDate||"")){
      v.km=obj.km; v.kmDate=obj.date;
    }
    saveState();closeModal();render();
  };
}

/* --- Sauvegarde / restauration manuelle (indépendante du lecteur) --- */
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Copié dans le presse-papier."),()=>fallbackCopy());
  } else fallbackCopy();
}
function fallbackCopy(){
  const ta=document.getElementById("dataOut");
  if(ta){ ta.focus(); ta.select();
    try{ document.execCommand("copy"); toast("Copié."); }
    catch(e){ toast("Sélectionnez le texte puis copiez-le."); } }
}
function downloadJSON(json){
  try{
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="carnet-entretien-"+today()+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast("Téléchargement lancé.");
  }catch(e){ toast("Téléchargement bloqué ici — copiez le texte."); }
}
function exportCSV(){
  const rows=[];
  const cell=v=>{ const s=(v==null?"":String(v)); return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  rows.push(["Véhicule","Date","Km","Intervention","Coût","Lieu","Références","Notes"].join(";"));
  state.vehicles.forEach(v=>{
    vehRecords(v.id).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(r=>{
      rows.push([v.marque+" "+v.modele, r.date||"", r.km??"", r.type||"",
        r.cout??"", r.lieu||"", r.refs||"", r.notes||""].map(cell).join(";"));
    });
  });
  try{
    const blob=new Blob(["\uFEFF"+rows.join("\r\n")],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="carnet-entretien-"+today()+".csv";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast("Export CSV lancé.");
  }catch(e){ toast("Export CSV bloqué ici."); }
}
function qrModal(){
  const url = (location && location.href && !/^about:/.test(location.href)) ? location.href.split("#")[0] : "";
  openModal(`
    <div class="modal-head"><div class="modal-title">QR code — accès rapide</div>
      <button class="icon-btn" id="x" aria-label="Fermer">✕</button></div>
    <div class="modal-body">
      <div class="hint" style="margin-bottom:8px">QR de l'adresse de l'app — à scanner ou imprimer (boîte à gants). Vérifiez/ajustez l'adresse si besoin.</div>
      <div class="field"><label>Adresse</label>
        <input id="qrUrl" value="${esc(url)}" placeholder="https://votre-pseudo.github.io/carnet/"></div>
      <div id="qrBox" style="display:flex;justify-content:center;padding:10px;background:#fff;border:1px solid var(--line);border-radius:6px"></div>
    </div>
    <div class="modal-foot"><span></span><div class="right">
      <button class="btn ghost" id="qrPrint">Imprimer</button>
      <button class="btn" id="qrGen">Générer</button></div></div>
  `);
  const box=document.getElementById("qrBox");
  function gen(){
    const u=document.getElementById("qrUrl").value.trim();
    if(!u){ box.innerHTML='<div class="hint" style="padding:20px">Saisissez une adresse.</div>'; return; }
    try{
      const qr=qrcode(0,"M"); qr.addData(u); qr.make();
      box.innerHTML=qr.createSvgTag({cellSize:5,margin:2,scalable:true});
      const svg=box.querySelector("svg"); if(svg){ svg.style.width="208px"; svg.style.height="208px"; }
    }catch(e){ box.innerHTML='<div class="hint" style="padding:20px">Adresse trop longue ou invalide pour un QR.</div>'; }
  }
  gen();
  document.getElementById("qrGen").onclick=gen;
  document.getElementById("x").onclick=closeModal;
  document.getElementById("qrPrint").onclick=()=>{
    const u=document.getElementById("qrUrl").value.trim(); if(!u){ toast("Saisissez une adresse."); return; }
    let svg=""; try{ const qr=qrcode(0,"M"); qr.addData(u); qr.make(); svg=qr.createSvgTag({cellSize:8,margin:2,scalable:true}); }catch(e){ toast("QR impossible."); return; }
    document.getElementById("printArea").innerHTML=`<div class="pqr"><h1>Carnet d'entretien</h1>
      <div class="qwrap">${svg}</div><div class="qurl">${esc(u)}</div></div>`;
    closeModal(); setTimeout(()=>window.print(),80);
  };
}

function dataModal(){
  const json = JSON.stringify(state, null, 2);
  openModal(`
    <div class="modal-head"><div class="modal-title">Sauvegarde des données</div>
      <button class="icon-btn" id="x" aria-label="Fermer">✕</button></div>
    <div class="modal-body">
      <div class="note">La sauvegarde automatique ne fonctionne pas dans tous les lecteurs. Pour ne rien perdre, gardez une copie du texte ci-dessous (copiez-le dans une note, ou téléchargez-le). Pour récupérer vos données, collez ce texte plus bas et touchez « Charger ».</div>
      <div class="field" style="margin-top:13px"><label>Votre carnet (à conserver)</label>
        <textarea id="dataOut" readonly style="min-height:120px;font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;font-size:11px;line-height:1.4">${esc(json)}</textarea></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin:-4px 0 20px">
        <button class="btn ghost tiny" id="copyBtn">Copier</button>
        <button class="btn ghost tiny" id="dlBtn">Télécharger (.json)</button>
        <button class="btn ghost tiny" id="csvBtn">Export CSV</button>
        <button class="btn ghost tiny" id="qrBtn">QR code</button>
      </div>
      <div class="field"><label>Restaurer — fichier ou texte</label>
        <input type="file" id="dataFile" accept="application/json,.json" class="filter" style="width:100%;margin-bottom:8px">
        <textarea id="dataIn" placeholder="…ou collez ici le texte d'une sauvegarde" style="min-height:90px;font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;font-size:11px"></textarea></div>
    </div>
    <div class="modal-foot"><span></span><div class="right">
      <button class="btn ghost" id="cancel">Fermer</button>
      <button class="btn" id="loadBtn">Charger</button></div></div>
  `);
  document.getElementById("x").onclick=closeModal;
  document.getElementById("cancel").onclick=closeModal;
  document.getElementById("copyBtn").onclick=()=>copyText(json);
  document.getElementById("dlBtn").onclick=()=>downloadJSON(json);
  document.getElementById("csvBtn").onclick=()=>exportCSV();
  document.getElementById("qrBtn").onclick=qrModal;
  const _df=document.getElementById("dataFile");
  if(_df) _df.onchange=()=>{
    const f=_df.files&&_df.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ document.getElementById("dataIn").value=rd.result; toast("Fichier lu — touchez « Charger »."); };
    rd.onerror=()=>toast("Lecture du fichier impossible.");
    rd.readAsText(f);
  };
  document.getElementById("loadBtn").onclick=()=>{
    const txt=document.getElementById("dataIn").value.trim();
    if(!txt){toast("Collez d'abord une sauvegarde.");return;}
    let obj; try{obj=JSON.parse(txt);}catch(e){toast("Texte illisible — vérifiez le copier-coller.");return;}
    if(!obj||!Array.isArray(obj.vehicles)){toast("Sauvegarde non reconnue.");return;}
    obj.records=Array.isArray(obj.records)?obj.records:[];
    obj.schedules=Array.isArray(obj.schedules)?obj.schedules:[];
    obj.todos=Array.isArray(obj.todos)?obj.todos:[];
    if(!obj.activeId) obj.activeId=obj.vehicles[0]?.id||null;
    state=obj; ensurePrefs(); saveState(); closeModal(); render(); toast("Données restaurées.");
  };
}

/* --- Impression du carnet (véhicule actif) --- */
function printModal(){
  const veh=activeVeh();
  if(!veh){ toast("Aucun véhicule à imprimer."); return; }
  const p=state.printPrefs;
  openModal(`
    <div class="modal-head"><div class="modal-title">Imprimer le carnet</div>
      <button class="icon-btn" id="x" aria-label="Fermer">✕</button></div>
    <div class="modal-body">
      ${state.vehicles.length>1?`<div class="field"><label>Véhicules</label>
        <div class="seg" id="pScope">
          <button type="button" data-s="active" aria-pressed="${p.scope!=="all"}">Véhicule affiché</button>
          <button type="button" data-s="all" aria-pressed="${p.scope==="all"}">Tous</button>
        </div></div>`:""}
      <div class="field"><label>Ordre de l'historique</label>
        <div class="seg" id="pOrder">
          <button type="button" data-o="desc" aria-pressed="${p.order!=="asc"}">Récent → ancien</button>
          <button type="button" data-o="asc" aria-pressed="${p.order==="asc"}">Ancien → récent</button>
        </div></div>
      <div class="field"><label>Colonnes affichées</label>
        <label class="pchk"><input type="checkbox" id="cKm" ${p.cols.km?"checked":""}> Kilométrage</label>
        <label class="pchk"><input type="checkbox" id="cCout" ${p.cols.cout?"checked":""}> Coût</label>
        <label class="pchk"><input type="checkbox" id="cNotes" ${p.cols.notes?"checked":""}> Lieu / Notes</label>
      </div>
      <div class="field"><label>Sections</label>
        <label class="pchk"><input type="checkbox" id="sSurv" ${p.surveiller?"checked":""}> Tableau « À surveiller »</label>
        <label class="pchk"><input type="checkbox" id="sTot" ${p.total?"checked":""}> Coût total en pied de page</label>
      </div>
      <div class="field"><label>Cases visa / cachet garage</label>
        <select id="pSign" class="filter" style="width:100%">
          <option value="0" ${p.sign==0?"selected":""}>Aucune</option>
          <option value="2" ${p.sign==2?"selected":""}>2 cases</option>
          <option value="4" ${p.sign==4?"selected":""}>4 cases</option>
          <option value="6" ${p.sign==6?"selected":""}>6 cases</option>
        </select>
        <div class="hint">Cases vierges à faire tamponner/signer par un garage — utile à la revente.</div>
      </div>
    </div>
    <div class="modal-foot"><span></span><div class="right">
      <button class="btn ghost" id="cancel">Annuler</button>
      <button class="btn" id="go">Imprimer</button></div></div>
  `);
  let order=p.order;
  document.querySelectorAll("#pOrder button").forEach(b=>b.onclick=()=>{
    order=b.dataset.o;document.querySelectorAll("#pOrder button").forEach(x=>x.setAttribute("aria-pressed",x===b));});
  let scope=p.scope;
  document.querySelectorAll("#pScope button").forEach(b=>b.onclick=()=>{
    scope=b.dataset.s;document.querySelectorAll("#pScope button").forEach(x=>x.setAttribute("aria-pressed",x===b));});
  document.getElementById("x").onclick=closeModal;
  document.getElementById("cancel").onclick=closeModal;
  document.getElementById("go").onclick=()=>{
    state.printPrefs={
      order,
      cols:{km:document.getElementById("cKm").checked,cout:document.getElementById("cCout").checked,notes:document.getElementById("cNotes").checked},
      surveiller:document.getElementById("sSurv").checked,
      total:document.getElementById("sTot").checked,
      sign:Number(document.getElementById("pSign").value),
      scope
    };
    saveState();closeModal();
    setTimeout(printDoc,80);
  };
}

function vehiclePrintHTML(veh,p){
  const recs=vehRecords(veh.id).slice()
    .sort((a,b)=>(a.date||"").localeCompare(b.date||"")||((a.km||0)-(b.km||0)));
  if(p.order!=="asc") recs.reverse();
  const total=recs.reduce((s,r)=>s+(Number(r.cout)||0),0);
  const scheds=vehSchedules(veh.id).map(s=>({s,st:computeStatus(s)}))
    .sort((a,b)=>rank[a.st.level]-rank[b.st.level]||((a.st.kmRemain??1e9)-(b.st.kmRemain??1e9)));
  const ct=ctStatus(veh);
  const meta=[veh.annee,veh.motorisation,veh.immat].filter(Boolean).map(esc).join(" · ");
  const statusTxt=l=>l==="late"?"En retard":l==="soon"?"À venir":"À jour";
  const showKm=p.cols.km, showCout=p.cols.cout, showNotes=p.cols.notes;

  const ctSchRow = ct ? `<tr><td>Contrôle technique</td><td>tous les 24 mois</td><td>${fmtDate(ct.date)}</td><td class="${ct.level==="late"?"late":""}">${statusTxt(ct.level)} — ${esc(ct.eta)}</td></tr>` : "";
  const schRows=scheds.map(({s,st})=>`<tr>
      <td>${esc(s.type)}</td>
      <td>${[s.intKm?fmtKmRaw(s.intKm)+" km":null,s.intMois?s.intMois+" mois":null].filter(Boolean).join(" / ")||"—"}</td>
      <td>${[st.nextKm?fmtKmRaw(st.nextKm)+" km":null,st.nextDate?fmtDate(st.nextDate):null].filter(Boolean).join(" · ")||"—"}</td>
      <td class="${st.level==="late"?"late":""}">${statusTxt(st.level)} — ${esc(st.eta)}</td>
    </tr>`).join("");

  const head=`<tr><th>Date</th>${showKm?'<th class="num">Km</th>':''}<th>Intervention</th>${showCout?'<th class="num">Coût</th>':''}${showNotes?'<th>Lieu / Notes</th>':''}</tr>`;
  const ncol=2+(showKm?1:0)+(showCout?1:0)+(showNotes?1:0);
  const recRows=recs.map(r=>{
    const notes=[r.lieu,r.refs?("réf. "+r.refs):null,r.notes].filter(Boolean).join(" — ");
    return `<tr>
      <td>${fmtDate(r.date)}</td>
      ${showKm?`<td class="num">${r.km!=null&&r.km!==""?fmtKmRaw(r.km):"—"}</td>`:''}
      <td>${esc(r.type)}</td>
      ${showCout?`<td class="num">${r.cout!=null&&r.cout!==""?fmtEUR(r.cout):"—"}</td>`:''}
      ${showNotes?`<td>${esc(notes)}</td>`:''}
    </tr>`;}).join("");

  const signBlock = p.sign>0 ? `<h2>Visas / cachets garage</h2>
    <div class="psign">${Array.from({length:p.sign}).map(()=>`<div class="box">Date&nbsp;:<br><br>Cachet et visa du garage</div>`).join("")}</div>` : "";
  const survBlock = p.surveiller&&(scheds.length||ct) ? `<h2>À surveiller</h2>
    <table><thead><tr><th>Entretien</th><th>Périodicité</th><th>Prochaine échéance</th><th>Statut</th></tr></thead><tbody>${ctSchRow}${schRows}</tbody></table>` : "";

  return `<div class="pveh">
    <h1>Carnet d'entretien — ${esc(veh.marque)} ${esc(veh.modele)}</h1>
    <div class="pmeta">${meta||"—"} &nbsp;|&nbsp; Kilométrage : ${veh.km!=null?fmtKmRaw(veh.km)+" km":"—"} (relevé le ${fmtDate(veh.kmDate)})</div>
    ${survBlock}
    <h2>Historique — ${recs.length} intervention${recs.length>1?"s":""}</h2>
    <table><thead>${head}</thead>
      <tbody>${recRows||`<tr><td colspan="${ncol}">Aucune intervention enregistrée.</td></tr>`}</tbody></table>
    ${signBlock}
    <div class="pfoot">${p.total?`<span class="ptot">Coût total : ${fmtEUR(total)}</span>`:"<span></span>"}<span>Imprimé le ${fmtDate(today())}</span></div>
  </div>`;
}

function printDoc(){
  const p=state.printPrefs;
  const list = (p.scope==="all" && state.vehicles.length) ? state.vehicles : [activeVeh()].filter(Boolean);
  if(!list.length){ toast("Aucun véhicule à imprimer."); return; }
  document.getElementById("printArea").innerHTML = list.map(v=>vehiclePrintHTML(v,p)).join("");
  window.print();
}

document.getElementById("dataBtn").onclick=dataModal;

if(_ss){ _ss.style.cursor="pointer"; _ss.title="Sauvegarde / restauration"; _ss.onclick=dataModal; }

render();

/* PWA : mode hors-ligne + installation */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

</script>
